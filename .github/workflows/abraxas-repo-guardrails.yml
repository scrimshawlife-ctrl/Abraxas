name: abraxas-repo-guardrails
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --no-cache-dir -e ".[dev]"
      - run: make preflight-oracle_signal_layer_v2
      - run: make preflight-mbom_v1
      - run: make preflight-mircl_v1
      - run: make preflight-forecast_portfolio_simulation_v0_1
      - run: make registry-check
      - run: make proof-check
      - run: make governance-lint
      - name: Dependency Boundary Check
        run: python scripts/check_optional_dependency_boundaries.py
      - name: Dependency Metadata Check
        run: python scripts/check_dependency_metadata_alignment.py
      - run: make release-readiness
      - run: make test
      - run: make repo-status
      - run: make continuity-drift || true
      - run: make release-manifest
