name: aal-viz-frontend-ci-proof

on:
  workflow_dispatch:
  push:
    paths:
      - 'frontend/aal-viz/**'
      - '.github/workflows/aal_viz_frontend_ci_proof.yml'

jobs:
  frontend-proof:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/aal-viz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm ci
        run: npm ci
      - name: npm test
        run: npm test
